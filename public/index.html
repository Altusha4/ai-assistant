<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study-Fit AI | Learning Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #1E293B; }
    .nav-active { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
    .topic-checked { opacity: 0.6; background-color: #F1F5F9 !important; border-color: #E2E8F0 !important; }
    .page-fade { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Стили для выбранного ответа */
    .option-selected { border-color: #4f46e5 !important; background-color: #f5f3ff !important; ring: 2px; ring-color: #4f46e5; }
  </style>
</head>

<body class="flex h-screen overflow-hidden">

<aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-6">
  <div class="flex items-center gap-3 mb-10">
    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">SF</div>
    <span class="font-extrabold text-xl tracking-tighter text-slate-800">Study-Fit</span>
  </div>

  <nav class="space-y-2 mb-8">
    <button onclick="showScreen('upload')" id="btn-upload" class="nav-btn w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-50 nav-active">📥 Upload New</button>
    <button onclick="showScreen('summary')" id="btn-summary" class="nav-btn w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-slate-400 opacity-30 cursor-not-allowed" disabled>📄 Summary</button>
    <button onclick="showScreen('roadmap')" id="btn-roadmap" class="nav-btn w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-slate-400 opacity-30 cursor-not-allowed" disabled>🗺️ Roadmap</button>
  </nav>

  <div class="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100">
    <div class="flex justify-between text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">
      <span>Progress</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
      <div id="progressBar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <div class="flex-grow flex flex-col min-h-0 text-slate-600">
    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Archive</h3>
    <div id="historyList" class="flex-grow overflow-y-auto space-y-1"></div>
  </div>

  <button onclick="location.reload()" class="mt-4 text-xs text-slate-300 hover:text-indigo-500 transition-colors text-center">Refresh Data</button>
</aside>

<main class="flex-grow p-12 overflow-y-auto">

  <div id="screen-upload" class="max-w-2xl mx-auto text-center mt-20 page-fade">
    <h1 class="text-4xl font-black mb-4">Study Assistant</h1>
    <div class="bg-white p-12 rounded-[3rem] shadow-xl border-2 border-dashed border-slate-200 hover:border-indigo-400 cursor-pointer" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload()">
      <div class="text-6xl mb-4">📂</div>
      <span id="uploadStatus" class="font-bold text-slate-700 text-xl block">Click to select file</span>
    </div>
  </div>

  <div id="screen-summary" class="max-w-4xl mx-auto hidden page-fade">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-black">Academic Summary</h2>
      <button onclick="prepareQuiz()" class="px-6 py-3 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">🧠 Start Quiz</button>
    </div>
    <div id="summaryContent" class="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100 prose prose-indigo"></div>
  </div>

  <div id="screen-quiz" class="max-w-2xl mx-auto hidden page-fade">
    <div id="quiz-setup" class="text-center py-20">
      <h2 class="text-3xl font-black mb-4">Knowledge Check</h2>
      <p class="text-slate-500 mb-8">Select number of questions:</p>
      <div class="flex justify-center gap-4 mb-10">
        <button onclick="startQuiz(3)" class="w-16 h-16 rounded-2xl border-2 border-slate-200 font-bold hover:border-indigo-500 transition">3</button>
        <button onclick="startQuiz(5)" class="w-16 h-16 rounded-2xl border-2 border-slate-200 font-bold hover:border-indigo-500 transition">5</button>
        <button onclick="startQuiz(10)" class="w-16 h-16 rounded-2xl border-2 border-slate-200 font-bold hover:border-indigo-500 transition">10</button>
      </div>
      <button onclick="showScreen('summary')" class="text-slate-400 hover:text-slate-600">Cancel</button>
    </div>

    <div id="quiz-container" class="hidden space-y-8 py-10">
      <div class="flex justify-between items-center">
        <span id="quiz-progress-text" class="text-xs font-bold text-indigo-600 uppercase">Question 1 of 5</span>
        <div class="h-2 w-32 bg-slate-100 rounded-full overflow-hidden">
          <div id="quiz-inner-bar" class="h-full bg-indigo-600 transition-all" style="width: 0%"></div>
        </div>
      </div>
      <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
        <h3 id="quiz-question" class="text-xl font-bold mb-8">...</h3>
        <div id="quiz-options" class="grid gap-3 mb-8"></div>
        <button id="next-btn" onclick="handleNext()" disabled class="w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold transition-all cursor-not-allowed">
          Select an answer
        </button>
      </div>
    </div>

    <div id="quiz-results" class="hidden text-center py-20 bg-white rounded-[3rem] shadow-xl border border-slate-100">
      <div class="text-6xl mb-6">🏆</div>
      <h2 class="text-3xl font-black mb-2">Quiz Results</h2>
      <p id="quiz-score-display" class="text-slate-500 mb-8">Score: 0 / 0</p>
      <button onclick="showScreen('summary')" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Continue Study</button>
    </div>
  </div>

  <div id="screen-roadmap" class="max-w-4xl mx-auto hidden page-fade">
    <h2 class="text-3xl font-black mb-8">Learning Roadmap</h2>
    <div id="roadmapContent" class="space-y-6"></div>
  </div>

  <div id="screen-study" class="max-w-4xl mx-auto hidden page-fade">
    <div id="studyContent"></div>
  </div>

</main>

<script>
  let roadmapData = null, currentCourseId = null, completedTopics = new Set();
  let quizQuestions = [], currentQuestionIndex = 0, userAnswers = [], quizBonus = 0;

  window.onload = loadHistory;

  async function loadHistory() {
    const list = document.getElementById('historyList');
    try {
      const res = await fetch('/api/courses');
      const courses = await res.json();
      list.innerHTML = courses.map(c => `
        <div class="group flex items-center justify-between p-2 rounded-xl hover:bg-slate-50 transition-all">
          <div onclick='openSavedCourse(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="flex-grow text-sm font-medium cursor-pointer truncate text-slate-600">📚 ${c.filename}</div>
          <button onclick="deleteCourse(event, '${c._id}')" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all">✕</button>
        </div>`).join('');
    } catch (e) { console.error(e); }
  }

  function openSavedCourse(course) {
    currentCourseId = course._id;
    roadmapData = course.roadmap;
    completedTopics = new Set(course.completedTopics || []);
    quizBonus = 0;
    document.getElementById('summaryContent').innerHTML = marked.parse(course.summary || "");
    renderRoadmap();
    updateProgressBar();
    unlockNav(['summary', 'roadmap']);
    showScreen('summary');
  }

  function prepareQuiz() {
    document.getElementById('quiz-setup').classList.remove('hidden');
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('quiz-results').classList.add('hidden');
    showScreen('quiz');
  }

  async function startQuiz(count) {
    const setup = document.getElementById('quiz-setup');
    const container = document.getElementById('quiz-container');
    setup.classList.add('hidden');
    container.classList.remove('hidden');
    document.getElementById('quiz-question').innerText = "AI is preparing questions...";
    document.getElementById('quiz-options').innerHTML = "";

    try {
      const res = await fetch('/generate-quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ courseId: currentCourseId, count })
      });
      const data = await res.json();
      quizQuestions = data.questions;
      currentQuestionIndex = 0;
      userAnswers = new Array(quizQuestions.length).fill(null);
      displayQuestion();
    } catch (e) { alert("Quiz Error"); showScreen('summary'); }
  }

  function displayQuestion() {
    const q = quizQuestions[currentQuestionIndex];
    const nextBtn = document.getElementById('next-btn');

    document.getElementById('quiz-progress-text').innerText = `Question ${currentQuestionIndex + 1} of ${quizQuestions.length}`;
    document.getElementById('quiz-inner-bar').style.width = ((currentQuestionIndex) / quizQuestions.length * 100) + '%';
    document.getElementById('quiz-question').innerText = q.q;

    // Обновляем текст кнопки на последнем вопросе
    nextBtn.innerText = currentQuestionIndex === quizQuestions.length - 1 ? "Finish Quiz" : "Next Question";
    nextBtn.disabled = userAnswers[currentQuestionIndex] === null;
    updateNextBtnStyle();

    const optionsHtml = q.options.map((opt, i) => `
      <button onclick="selectOption(${i})" id="opt-${i}"
              class="option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-100 font-bold hover:border-indigo-300 transition-all ${userAnswers[currentQuestionIndex] === i ? 'option-selected' : ''}">
        ${opt}
      </button>
    `).join('');
    document.getElementById('quiz-options').innerHTML = optionsHtml;
  }

  function selectOption(index) {
    userAnswers[currentQuestionIndex] = index;

    // Визуальное переключение классов
    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('option-selected'));
    document.getElementById(`opt-${index}`).classList.add('option-selected');

    // Активация кнопки "Next"
    const nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = false;
    updateNextBtnStyle();
  }

  function updateNextBtnStyle() {
    const nextBtn = document.getElementById('next-btn');
    if (nextBtn.disabled) {
      nextBtn.className = "w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold transition-all cursor-not-allowed";
    } else {
      nextBtn.className = "w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 transition-all hover:bg-indigo-700";
    }
  }

  function handleNext() {
    if (currentQuestionIndex < quizQuestions.length - 1) {
      currentQuestionIndex++;
      displayQuestion();
    } else {
      calculateResults();
    }
  }

  function calculateResults() {
    let score = 0;
    quizQuestions.forEach((q, i) => {
      if (userAnswers[i] === q.correct) score++;
    });

    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('quiz-results').classList.remove('hidden');
    document.getElementById('quiz-score-display').innerText = `You answered ${score} out of ${quizQuestions.length} correctly.`;

    // Бонус к прогрессу: 15% за идеальный результат
    quizBonus = Math.round((score / quizQuestions.length) * 15);
    updateProgressBar();
  }

  function updateProgressBar() {
    const totalTopics = roadmapData ? roadmapData.reduce((acc, lvl) => acc + (lvl.topics?.length || 0), 0) : 0;
    let percent = totalTopics > 0 ? Math.round((completedTopics.size / totalTopics) * 100) : 0;
    percent = Math.min(100, percent + quizBonus);

    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressPercent').innerText = percent + '%';
  }

  function showScreen(id) {
    ['upload', 'summary', 'roadmap', 'study', 'quiz'].forEach(s => document.getElementById('screen-'+s).classList.add('hidden'));
    ['upload', 'summary', 'roadmap'].forEach(b => document.getElementById('btn-'+b)?.classList.remove('nav-active'));
    document.getElementById('screen-'+id).classList.remove('hidden');
    if(id !== 'quiz' && id !== 'study') document.getElementById('btn-'+id)?.classList.add('nav-active');
  }

  // Остальные функции без изменений (renderRoadmap, toggleTopic, handleFileUpload, deleteCourse, fetchTopic)
  function renderRoadmap() {
    const container = document.getElementById('roadmapContent');
    container.innerHTML = roadmapData.map((lvl, i) => `
      <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 flex gap-8 mb-6">
        <div class="text-5xl font-black text-slate-100">0${i+1}</div>
        <div class="w-full">
          <h3 class="text-xl font-bold mb-4">${lvl.title}</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${(lvl.topics || []).map(t => {
      const isChecked = completedTopics.has(t);
      return `<div id="topic-card-${t}" class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-transparent transition-all ${isChecked ? 'topic-checked' : ''}">
                <input type="checkbox" onchange="toggleTopic('${t}')" ${isChecked ? 'checked' : ''} class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                <button onclick="fetchTopic('${t.replace(/'/g, "\\'")}')" class="text-left font-bold text-sm hover:text-indigo-600 flex-grow">${t}</button>
              </div>`;
    }).join('')}
          </div>
        </div>
      </div>`).join('');
  }

  async function toggleTopic(topic) {
    const card = document.getElementById(`topic-card-${topic}`);
    if (completedTopics.has(topic)) completedTopics.delete(topic); else completedTopics.add(topic);
    updateProgressBar();
    await fetch(`/api/courses/${currentCourseId}/toggle-topic`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic })
    });
  }

  async function handleFileUpload() {
    const status = document.getElementById('uploadStatus');
    const fileInput = document.getElementById('fileInput');
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    status.innerHTML = `<span class="text-indigo-600 font-bold">Analyzing...</span>`;
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      openSavedCourse(data);
      loadHistory();
      status.innerText = "Click to select file";
    } catch (e) { alert("Upload failed"); status.innerText = "Try Again"; }
  }

  async function fetchTopic(topic) {
    showScreen('study');
    const container = document.getElementById('studyContent');
    container.innerHTML = `<div class="p-20 text-center font-bold text-slate-400 animate-pulse">AI deep dive...</div>`;
    try {
      const res = await fetch('/explain-topic', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic })
      });
      const data = await res.json();
      container.innerHTML = `<div class="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden"><div class="bg-slate-900 px-10 py-6 text-white font-bold">${topic}</div><div class="p-10 prose prose-indigo">${marked.parse(data.explanation)}</div></div>`;
      if(window.MathJax) MathJax.typesetPromise();
    } catch (e) { alert("Error"); }
  }

  async function deleteCourse(event, id) {
    event.stopPropagation();
    if (!confirm("Delete?")) return;
    await fetch(`/api/courses/${id}`, { method: 'DELETE' });
    if (currentCourseId === id) location.reload(); else loadHistory();
  }

  function unlockNav(ids) {
    ids.forEach(id => {
      const b = document.getElementById('btn-'+id);
      if (b) { b.disabled = false; b.classList.remove('opacity-30', 'cursor-not-allowed'); }
    });
  }
</script>
</body>
</html>
