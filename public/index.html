<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study-Fit AI | Learning Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=JetBrains+Mono&display=swap');

    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #1E293B; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }

    .prose { max-width: 100% !important; }
    .prose h2 { font-weight: 800; color: #4F46E5; border-bottom: 2px solid #EEF2FF; padding-bottom: 0.5rem; margin-top: 2rem; }
    .prose h3 { font-weight: 700; color: #1E293B; margin-top: 1.5rem; }
    .prose strong { color: #4F46E5; background: #F5F3FF; padding: 2px 4px; border-radius: 4px; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .prose th { background: #F1F5F9; padding: 0.75rem; text-align: left; font-size: 0.875rem; }
    .prose td { padding: 0.75rem; border-bottom: 1px solid #F1F5F9; font-size: 0.875rem; }
    .prose blockquote { border-left: 4px solid #4F46E5; background: #F8FAFC; padding: 1rem; border-radius: 0 12px 12px 0; font-style: italic; color: #475569; }

    mjx-container { font-size: 1.1em !important; color: #4F46E5; padding: 10px 0; }

    .hidden { display: none; }
    .nav-active { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }

    .history-item { transition: all 0.2s; border-left: 3px solid transparent; }
    .history-item:hover { background-color: #f1f5f9; border-left: 3px solid #4f46e5; }

    .progress-transition { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .topic-checked { opacity: 0.6; background-color: #F1F5F9 !important; border-color: #E2E8F0 !important; }
  </style>
</head>

<body class="flex h-screen overflow-hidden">

<aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-6">
  <div class="flex items-center gap-3 mb-10">
    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">SF</div>
    <span class="font-extrabold text-xl tracking-tighter text-slate-800">Study-Fit</span>
  </div>

  <nav class="space-y-2 mb-8">
    <button onclick="showScreen('upload')" id="btn-upload" class="nav-btn w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-50 nav-active">📥 Upload New</button>
    <button onclick="showScreen('summary')" id="btn-summary" class="nav-btn w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-slate-400 opacity-30 cursor-not-allowed" disabled>📄 Summary</button>
    <button onclick="showScreen('roadmap')" id="btn-roadmap" class="nav-btn w-full text-left px-4 py-3 rounded-xl font-bold text-sm text-slate-400 opacity-30 cursor-not-allowed" disabled>🗺️ Roadmap</button>
  </nav>

  <div class="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100">
    <div class="flex justify-between text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">
      <span>Course Progress</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
      <div id="progressBar" class="bg-indigo-600 h-full progress-transition" style="width: 0%"></div>
    </div>
  </div>

  <div class="flex-grow flex flex-col min-h-0 text-slate-600">
    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Archive</h3>
    <div id="historyList" class="flex-grow overflow-y-auto space-y-1 pr-2">
      <div class="text-xs text-slate-400 animate-pulse">Loading archive...</div>
    </div>
  </div>

  <button onclick="location.reload()" class="mt-4 text-xs text-slate-300 hover:text-indigo-500 transition-colors">Refresh Data</button>
</aside>

<main class="flex-grow p-12 overflow-y-auto">

  <div id="screen-upload" class="max-w-2xl mx-auto text-center mt-20 page-fade">
    <h1 class="text-4xl font-black mb-4 text-slate-800">Study Assistant</h1>
    <p class="text-slate-500 mb-10">Upload your lectures. AI will generate a summary and roadmap instantly.</p>
    <div class="bg-white p-12 rounded-[3rem] shadow-xl border-2 border-dashed border-slate-200 hover:border-indigo-400 transition-all cursor-pointer" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload()">
      <div class="text-6xl mb-4">📂</div>
      <span id="uploadStatus" class="font-bold text-slate-700 text-xl block">Click to select file</span>
      <p class="text-slate-400 text-sm mt-2 text-indigo-500 font-medium">Supports PDF, DOCX, and TXT</p>
    </div>
  </div>

  <div id="screen-summary" class="max-w-4xl mx-auto hidden page-fade">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-black text-slate-800">Academic Summary</h2>
      <button onclick="window.print()" class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50 transition">Export PDF</button>
    </div>
    <div id="summaryContent" class="bg-white p-12 rounded-[3rem] shadow-2xl shadow-indigo-100/50 border border-slate-100 prose prose-indigo">
    </div>
  </div>

  <div id="screen-roadmap" class="max-w-4xl mx-auto hidden page-fade">
    <h2 class="text-3xl font-black mb-8 text-slate-800">Learning Roadmap</h2>
    <div id="roadmapContent" class="space-y-6"></div>
  </div>

  <div id="screen-study" class="max-w-4xl mx-auto hidden page-fade">
    <div id="studyContent" class="space-y-8"></div>
  </div>

</main>

<script>
  let roadmapData = null;
  let currentCourseId = null;
  let completedTopics = new Set();

  window.onload = loadHistory;

  async function loadHistory() {
    const list = document.getElementById('historyList');
    try {
      const res = await fetch('/api/courses');
      const courses = await res.json();
      if (courses.length === 0) {
        list.innerHTML = `<div class="text-xs text-slate-400 italic">History is empty</div>`;
        return;
      }
      list.innerHTML = courses.map(c => `
        <div onclick='openSavedCourse(${JSON.stringify(c).replace(/'/g, "&apos;")})'
             class="history-item p-3 rounded-xl text-sm font-medium cursor-pointer truncate">
          📚 ${c.filename}
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = `<div class="text-xs text-red-400">Failed to load archive</div>`;
    }
  }

  function openSavedCourse(course) {
    currentCourseId = course._id;
    roadmapData = course.roadmap;

    // Restore the set of completed topics for this specific note
    completedTopics = new Set(course.completedTopics || []);

    updateProgressBar();
    document.getElementById('summaryContent').innerHTML = marked.parse(course.summary || "");
    renderRoadmap();

    unlockNav(['summary', 'roadmap']);
    showScreen('summary');

    // Fix Math rendering for dynamically switched content
    setTimeout(() => { if (window.MathJax) MathJax.typesetPromise(); }, 150);
  }

  function showScreen(screenId) {
    ['upload', 'summary', 'roadmap', 'study'].forEach(id => {
      document.getElementById('screen-' + id).classList.add('hidden');
      const btn = document.getElementById('btn-' + id);
      if (btn) btn.classList.remove('nav-active', 'text-white');
    });
    document.getElementById('screen-' + screenId).classList.remove('hidden');
    const activeBtn = document.getElementById('btn-' + screenId);
    if (activeBtn) activeBtn.classList.add('nav-active', 'text-white');
  }

  function unlockNav(ids) {
    ids.forEach(id => {
      const btn = document.getElementById('btn-' + id);
      if (btn) {
        btn.disabled = false;
        btn.classList.remove('opacity-30', 'cursor-not-allowed');
      }
    });
  }

  async function handleFileUpload() {
    const status = document.getElementById('uploadStatus');
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files[0]) return;

    status.innerHTML = `<span class="text-indigo-600 font-bold">Processing AI Analysis...</span>`;
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      openSavedCourse(data);
      loadHistory();
      status.innerText = "Click to select file";
    } catch (e) {
      alert("Analysis failed. Please try a different file.");
      status.innerText = "Try Again";
    }
  }

  function renderRoadmap() {
    const container = document.getElementById('roadmapContent');
    container.innerHTML = roadmapData.map((lvl, i) => `
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex gap-8 page-fade">
          <div class="text-5xl font-black text-slate-100 select-none">0${i + 1}</div>
          <div class="w-full">
            <h3 class="text-xl font-bold mb-4 text-slate-800">${lvl.title || 'Section'}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              ${(lvl.topics || []).map(t => {
      const isChecked = completedTopics.has(t);
      return `
                <div id="topic-card-${t}" class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-transparent transition-all ${isChecked ? 'topic-checked' : ''}">
                  <input type="checkbox" onchange="toggleTopic('${t}')" ${isChecked ? 'checked' : ''} class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                  <button onclick="fetchTopic('${t.replace(/'/g, "\\'")}')" class="text-left font-bold text-sm hover:text-indigo-600 flex-grow">
                    ${t}
                  </button>
                </div>`;
    }).join('')}
            </div>
          </div>
        </div>
      `).join('');
  }

  async function toggleTopic(topic) {
    const card = document.getElementById(`topic-card-${topic}`);

    // UI Update
    if (completedTopics.has(topic)) {
      completedTopics.delete(topic);
      card.classList.remove('topic-checked');
    } else {
      completedTopics.add(topic);
      card.classList.add('topic-checked');
    }
    updateProgressBar();

    // Database Sync
    try {
      await fetch(`/api/courses/${currentCourseId}/toggle-topic`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic })
      });
    } catch (e) {
      console.error("Progress synchronization failed");
    }
  }

  function updateProgressBar() {
    const total = roadmapData ? roadmapData.reduce((acc, lvl) => acc + lvl.topics.length, 0) : 0;
    const current = completedTopics.size;
    const percent = total > 0 ? Math.round((current / total) * 100) : 0;

    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressPercent').innerText = percent + '%';
  }

  async function fetchTopic(topic) {
    showScreen('study');
    const container = document.getElementById('studyContent');
    container.innerHTML = `<div class="p-10 bg-white rounded-3xl animate-pulse text-slate-400 font-bold italic text-center">AI is analyzing lecture context for: ${topic}...</div>`;

    try {
      const res = await fetch('/explain-topic', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic })
      });
      const data = await res.json();
      container.innerHTML = `
          <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden page-fade">
            <div class="bg-slate-900 px-10 py-6 text-white font-bold flex justify-between items-center">
                <span>${topic}</span>
                <span class="text-[10px] opacity-40 uppercase tracking-widest">Deep Dive Analysis</span>
            </div>
            <div class="p-10 prose prose-indigo max-w-none text-slate-700">${marked.parse(data.explanation)}</div>
          </div>`;

      if (window.MathJax) MathJax.typesetPromise();
    } catch (e) {
      alert("AI analysis error. Check server connectivity.");
    }
  }
</script>
</body>

</html>
