<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="container">
    <h1>AI Course Companion</h1>

    <form id="uploadForm">
        <input type="file" id="fileInput" required />
        <button type="submit">Analyze Course</button>
    </form>

    <div id="loading" class="hidden">Analyzing...</div>

    <div id="result"></div>
</div>

<script>
    document.getElementById("uploadForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const fileInput = document.getElementById("fileInput");
        const resultDiv = document.getElementById("result");
        const loading = document.getElementById("loading");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        loading.classList.remove("hidden");
        resultDiv.innerHTML = "";

        try {
            const response = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            loading.classList.add("hidden");

            if (data.analysis && data.analysis.levels) {
                renderRoadmap(data.analysis.levels);
            } else {
                resultDiv.innerHTML = `<p style="color:red">Ошибка: ${data.error || 'Не удалось разобрать данные'}</p>`;
            }
        } catch (err) {
            loading.classList.add("hidden");
            resultDiv.innerHTML = `<p style="color:red">Ошибка сервера: ${err.message}</p>`;
        }
    });

    function renderRoadmap(levels) {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = `<h2>🚀 Ваш персональный план обучения</h2>`;

        levels.forEach((level, index) => {
            const levelCard = document.createElement("div");
            levelCard.className = "level-card";

            levelCard.innerHTML = `
            <div class="level-header">
                <span class="level-number">${index + 1}</span>
                <h3>${level.title}</h3>
            </div>
            <p class="level-description">${level.description}</p>
            <ul class="topic-list">
                ${level.topics.map(topic => `<li><input type="checkbox"> ${topic}</li>`).join('')}
            </ul>
        `;
            resultDiv.appendChild(levelCard);
        });
    }
</script>

</body>
</html>
